document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n\n\n\n<script src=\"b3ec95c4-ed36-47f1-a328-e4d86b44c957\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://api.fontshare.com/v2/css?f%5B%5D=clash-display@400,500,600,700&amp;f%5B%5D=satoshi@400,500,700,900&amp;display=swap\" rel=\"stylesheet\">\n  <style>/* ============================================================================\n   SILHOUWED — Colors & Type foundations\n   \"Boutiques Beyond Borders\"\n   A marketplace bringing India's boutiques to buyers everywhere.\n   ----------------------------------------------------------------------------\n   Fonts: Clash Display (display/headers) + Satoshi (body/UI), both from\n   Fontshare. Sevillana / Seaweed Script are decorative accent scripts.\n   Load this <link> in the <head> BEFORE this stylesheet:\n   <link href=\"https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&f[]=satoshi@300,400,500,700,900&display=swap\" rel=\"stylesheet\">\n   <link href=\"https://fonts.googleapis.com/css2?family=Sevillana&family=Seaweed+Script&display=swap\" rel=\"stylesheet\">\n   ========================================================================== */\n\n:root {\n  /* ----- PRIMARY · Wine / Maroon (brand core, base #8B1E38) ----------------- */\n  --primary-100: #1C060D;   /* deepest — logo plate, headers on dark */\n  --primary-90:  #2E0A15;\n  --primary-80:  #460F20;\n  --primary-70:  #5D142A;\n  --primary-60:  #741935;\n  --primary:     #8B1E38;   /* BASE — buttons, links, brand accents */\n  --primary-50:  #9E445F;\n  --primary-40:  #B2697F;\n  --primary-30:  #C58F9F;\n  --primary-20:  #D8B4BF;\n  --primary-10:  #E8D2D9;\n  --primary-5:   #F0CCD1;   /* faint wash / tinted surfaces */\n\n  /* ----- ACCENT 1 · Gold / Marigold (base #FFC300) -------------------------- */\n  --gold-100: #332700;\n  --gold-90:  #554100;\n  --gold-80:  #806200;\n  --gold-70:  #AA8200;\n  --gold-60:  #D5A300;\n  --gold:     #FFC300;      /* BASE — highlights, the logo dot, deal badges */\n  --gold-50:  #FFCD2A;\n  --gold-40:  #FFD755;\n  --gold-30:  #FFE180;\n  --gold-20:  #FFEBAA;\n  --gold-10:  #FFF3CC;\n\n  /* ----- ACCENT 2 · Teal / Peacock (base #029E9D) --------------------------- */\n  --teal-100: #00201F;\n  --teal-90:  #013534;\n  --teal-80:  #014F4F;\n  --teal-70:  #016969;\n  --teal-60:  #028483;\n  --teal:     #029E9D;      /* BASE */\n  --teal-50:  #2CAEAD;\n  --teal-40:  #56BEBE;\n  --teal-30:  #81CFCE;\n  --teal-20:  #ABDFDE;\n  --teal-10:  #CCECEB;\n\n  /* ----- ACCENT 3 · Indigo / Ink Blue (base #3C4CAD) ------------------------ */\n  --blue-100: #0C0F23;\n  --blue-90:  #14193A;\n  --blue-80:  #1E2657;\n  --blue-70:  #283373;\n  --blue-60:  #323F90;\n  --blue:     #3C4CAD;      /* BASE */\n  --blue-50:  #5D6ABB;\n  --blue-40:  #7D88C8;\n  --blue-30:  #9EA6D6;\n  --blue-20:  #BEC3E4;\n  --blue-10:  #D8DBEF;\n\n  /* ----- NEUTRAL · Gray (base #CECECE) -------------------------------------- */\n  --gray-100: #292929;\n  --gray-90:  #454545;\n  --gray-80:  #676767;\n  --gray-70:  #898989;\n  --gray-60:  #ACACAC;\n  --gray:     #CECECE;\n  --gray-50:  #D6D6D6;\n  --gray-40:  #DEDEDE;\n  --gray-30:  #E7E7E7;\n  --gray-20:  #EFEFEF;\n  --gray-10:  #F5F5F5;\n\n  /* ----- SEMANTIC · Success (green, base #2D8659) --------------------------- */\n  --success-80: #17432D;\n  --success-70: #1E593B;\n  --success-60: #26704A;\n  --success:    #2D8659;\n  --success-30: #96C3AC;\n  --success-20: #B9D7C8;\n  --success-10: #D5E7DE;\n\n  /* ----- SEMANTIC · Error (red, base #B3001B) ------------------------------- */\n  --error-80: #5A000E;\n  --error-70: #770012;\n  --error-60: #950017;\n  --error:    #B3001B;\n  --error-30: #D9808D;\n  --error-20: #E6AAB3;\n  --error-10: #F0CCD1;\n\n  /* ----- SURFACES & INK ----------------------------------------------------- */\n  --white:        #FFFFFF;\n  --cream:        #FFF9F2;   /* app canvas — warm ivory (255,249,242) */\n  --cream-pink:   #FFF9FB;   /* faint blush surface */\n  --logo-cream:   #FAF6F0;   /* logo wordmark on dark plates */\n  --surface:      #FFFFFF;   /* cards */\n  --plate-dark:   #1C060D;   /* darkest brand plate */\n  --neutral-dark: #363636;   /* style-guide dark panels */\n  --neutral-262:  #262626;\n\n  /* Semantic ink (text) */\n  --ink:        #292929;     /* primary text / headings */\n  --ink-2:      #454545;     /* body copy */\n  --ink-3:      #676767;     /* secondary */\n  --ink-4:      #898989;     /* tertiary / captions */\n  --ink-placeholder: #717680;\n  --border:     #CECECE;     /* default control border */\n  --border-soft:#E6E6E6;     /* hairline dividers */\n  --border-input:#CECECE;\n\n  /* ----- TYPE FAMILIES ------------------------------------------------------ */\n  --font-display: \"Clash Display\", \"Clash Display Variable\", Georgia, serif;\n  --font-body: \"Satoshi\", \"Satoshi Variable\", system-ui, -apple-system, sans-serif;\n  --font-script: \"Sevillana\", cursive;      /* festive Indian accent headline */\n  --font-script-2: \"Seaweed Script\", cursive;\n\n  /* ----- TYPE SCALE (display = Clash, body = Satoshi) ----------------------- */\n  /* Header sizes use Clash Display; weights 200–700 available.                 */\n  --h1: 700 48px/1.15 var(--font-display);\n  --h2: 600 40px/1.2  var(--font-display);\n  --h3: 600 32px/1.25 var(--font-display);\n  --h4: 500 24px/1.3  var(--font-display);\n  --h5: 500 20px/1.3  var(--font-display);\n  --h6: 600 18px/1.35 var(--font-display);\n\n  /* Body sizes use Satoshi. App UI is dense: 13/14px is the workhorse.         */\n  --body-lg:   400 18px/1.5  var(--font-body);   /* lead paragraph */\n  --body-base: 400 16px/1.5  var(--font-body);   /* standard body */\n  --body-sm:   500 14px/1.5  var(--font-body);   /* UI default / labels */\n  --body-xs:   500 13px/1.3  var(--font-body);   /* dense UI, list rows */\n  --body-xxs:  500 11px/1.3  var(--font-body);   /* meta, sublabels */\n  --body-note: 400 10px/1.5  var(--font-body);   /* legal / micro */\n\n  /* ----- RADII -------------------------------------------------------------- */\n  --r-xs: 4px;\n  --r-sm: 8px;     /* inputs, chips */\n  --r-md: 12px;    /* cards, swatches, buttons */\n  --r-lg: 16px;    /* sheets, large cards */\n  --r-xl: 24px;\n  --r-pill: 999px; /* tags, segmented controls */\n\n  /* ----- SPACING (4px base) ------------------------------------------------- */\n  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;\n  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;\n  --sp-12: 48px; --sp-16: 64px;\n\n  /* ----- ELEVATION (soft, cool-gray shadows) -------------------------------- */\n  --shadow-xs: 0px 1px 2px 0px rgba(10,13,18,0.05);\n  --shadow-sm: 0px 1px 3px 0px rgba(10,13,18,0.10), 0px 1px 2px -1px rgba(10,13,18,0.10);\n  --shadow-md: 0px 4px 8px -2px rgba(10,13,18,0.10), 0px 2px 4px -2px rgba(10,13,18,0.06);\n  --shadow-lg: 0px 12px 16px -4px rgba(10,13,18,0.08), 0px 4px 6px -2px rgba(10,13,18,0.03);\n  --shadow-nav: 0px -0.33px 0px 0px rgba(0,0,0,0.30); /* bottom tab hairline */\n}\n\n/* ----- SEMANTIC ELEMENT DEFAULTS -------------------------------------------- */\nh1, .h1 { font: var(--h1); color: var(--ink); letter-spacing: -0.01em; margin: 0; }\nh2, .h2 { font: var(--h2); color: var(--ink); letter-spacing: -0.01em; margin: 0; }\nh3, .h3 { font: var(--h3); color: var(--ink); margin: 0; }\nh4, .h4 { font: var(--h4); color: var(--ink); margin: 0; }\nh5, .h5 { font: var(--h5); color: var(--ink); margin: 0; }\nh6, .h6 { font: var(--h6); color: var(--ink); margin: 0; }\np, .body { font: var(--body-base); color: var(--ink-2); margin: 0; }\nsmall, .caption { font: var(--body-xxs); color: var(--ink-4); }\na { color: var(--primary); text-decoration: none; }\na:hover { color: var(--primary-60); }\n\n.script { font-family: var(--font-script); font-weight: 400; }\n<\u002Fstyle>\n  <script src=\"3de39472-76ca-46bc-91e0-c05cb166323c\"><\u002Fscript>\n  <script>\n    window.addEventListener('error', function (e) {\n      if (e && e.message && e.message.indexOf('ResizeObserver loop') !== -1) { e.stopImmediatePropagation(); e.preventDefault(); }\n    }, true);\n  <\u002Fscript>\n  <style>\n    *{box-sizing:border-box}\n    body{margin:0;background:#e6e2dd;font-family:var(--font-body);-webkit-font-smoothing:antialiased}\n    .noscroll::-webkit-scrollbar{width:0;height:0;display:none}\n    .noscroll{scrollbar-width:none}\n    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}\n    @keyframes fadeIn{from{opacity:0}to{opacity:1}}\n    @keyframes pop{0%{transform:scale(.5);opacity:0}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}\n    @keyframes dash{to{stroke-dashoffset:0}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 16px\">\n  <div style=\"position:relative;width:414px;height:868px;background:#0e0e11;border-radius:54px;padding:12px;box-shadow:0 40px 80px -20px rgba(20,8,12,.55),0 0 0 1px rgba(255,255,255,.04) inset\">\n    <div style=\"position:relative;width:100%;height:100%;background:var(--cream);border-radius:43px;overflow:hidden;display:flex;flex-direction:column\">\n\n      <!-- status bar -->\n      <div style=\"flex:none;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 30px 0 32px;color:var(--ink);z-index:4\">\n        <span style=\"font:700 15px/1 var(--font-body)\">9:41<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:16px\">\n          <i class=\"ph-fill ph-cell-signal-full\"><\u002Fi>\n          <i class=\"ph-fill ph-wifi-high\"><\u002Fi>\n          <i class=\"ph-fill ph-battery-high\" style=\"font-size:20px\"><\u002Fi>\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- header -->\n      <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:6p          <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <div style=\"padding:4px 14px\">\n                  <sc-for list=\"{{ o.items }}\" as=\"it\">\n                    <div style=\"display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-soft)\">\n                      <div style=\"{{ it.imgStyle }}\"><\u002Fdiv>\n                      <div style=\"flex:1;min-width:0\">\n                        <div style=\"display:flex;justify-content:space-between;gap:8px\">\n                          <span style=\"font:700 14px/1.3 var(--font-body);color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">{{ it.name }}<\u002Fspan>\n                          <i class=\"ph ph-caret-right\" style=\"font-size:16px;color:var(--ink-4);flex:none;margin-top:2px\"><\u002Fi>\n                        <\u002Fdiv>\n                        <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:8px\">\n                          <span style=\"display:inline-flex;align-items:center;gap:4px;font:700 11px/1 var(--font-body);color:var(--ink-2);background:var(--gray-10);border:1px solid var(--border-soft);padding:5px 9px;border-radius:7px\">Qty <span style=\"color:var(--ink)\">{{ it.qty }}<\u002Fspan><\u002Fspan>\n                          <span style=\"display:inline-flex;align-items:center;gap:4px;font:700 11px/1 var(--font-body);color:var(--primary);background:var(--primary-5);padding:5px 9px;border-radius:7px\"><i class=\"ph-fill ph-scissors\" style=\"font-size:12px\"><\u002Fi>Made to measure<\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:9px\">\n                          <span style=\"display:inline-flex;align-items:center;gap:5px;font:700 11px/1 var(--font-body);color:{{ it.statusColor }}\"><span style=\"width:6px;height:6px;border-radius:999px;background:{{ it.statusColor }}\"><\u002Fspan>{{ it.statusLabel }}<\u002Fspan>\n                          <span style=\"font:500 11px/1 var(--font-body);color:var(--ink-3)\">By {{ it.deliver }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--gray-10)\">\n                  <span style=\"font:500 12px/1 var(--font-body);color:var(--ink-3)\">{{ o.itemCount }}<\u002Fspan>\n                  <span style=\"font:500 13px/1 var(--font-body);color:var(--ink-3)\">Total: <span style=\"font:900 15px/1 var(--font-body);color:var(--ink)\">{{ o.totalFmt }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ ORDER DETAIL ============ -->\n        <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:2px 16px 24px\">\n\n            <!-- order meta -->\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;padding:4px 2px 12px\">\n              <div>\n                <div style=\"font:700 14px/1.3 var(--font-body);color:var(--ink)\">Order #{{ d.idFull }}<\u002Fdiv>\n                <div style=\"margin-top:9px;display:inline-flex;align-items:center;gap:6px;border:1px solid {{ d.statusColor }};color:{{ d.statusColor }};font:700 11px/1 var(--font-body);padding:6px 11px;border-radius:999px\"><span style=\"width:6px;height:6px;border-radius:999px;background:{{ d.statusColor }}\"><\u002Fspan>{{ d.statusLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right\">\n                <div style=\"font:400 12px/1.3 var(--font-body);font-style:italic;color:var(--ink-4)\">{{ d.placedAt }}<\u002Fdiv>\n                <div style=\"font:500 12px/1.4 var(--font-body);color:var(--ink-3);margin-top:8px\">Est. delivery: {{ d.deliver }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- balance banner -->\n            <sc-if value=\"{{ d.showBanner }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:14px;background:linear-gradient(100deg,var(--primary-100),var(--primary-80));border-radius:14px;margin-bottom:16px\">\n                <div style=\"width:40px;height:40px;border-radius:11px;background:rgba(255,195,0,.16);display:flex;align-items:center;justify-content:center;flex:none\"><i class=\"ph-fill ph-wallet\" style=\"font-size:21px;color:var(--gold)\"><\u002Fi><\u002Fdiv>\n                <div style=\"flex:1\">\n                  <div style=\"font:700 13px/1.3 var(--font-body);color:var(--gold)\">Balance payable on this order<\u002Fdiv>\n                  <div style=\"font:500 11px/1.4 var(--font-body);color:var(--primary-20);margin-top:2px\">{{ d.bannerNote }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right\"><div style=\"font:900 18px/1 var(--font-body);color:#fff\">{{ d.bannerRemainingFmt }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- items -->\n            <sc-for list=\"{{ d.items }}\" as=\"it\">\n              <div style=\"background:#fff;border:1px solid var(--border-soft);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:16px\">\n                <div style=\"padding:14px\">\n                  <div style=\"font:500 11px/1 var(--font-body);color:var(--ink-4);margin-bottom:9px\">ID #{{ it.lineId }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:13px\">\n                    <div style=\"{{ it.imgStyle }}\"><\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font:700 15px/1.3 var(--font-body);color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">{{ it.name }}<\u002Fdiv>\n                      <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:9px\">\n                        <span style=\"font:700 11px/1 var(--font-body);color:var(--ink-2);background:var(--gray-10);border:1px solid var(--border-soft);padding:5px 9px;border-radius:7px\">Qty {{ it.qty }}<\u002Fspan>\n                        <span style=\"font:700 11px/1 var(--font-body);color:var(--primary);background:var(--primary-5);padding:5px 9px;border-radius:7px\">{{ it.priceFmt }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"margin-top:9px;display:inline-flex;align-items:center;gap:5px;font:700 11px/1 var(--font-body);color:{{ it.statusColor }}\"><span style=\"width:6px;height:6px;border-radius:999px;background:{{ it.statusColor }}\"><\u002Fspan>{{ it.statusLabel }} · By {{ it.deliver }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <!-- measurements -->\n                  <div onclick=\"{{ it.onToggleMeasure }}\" style=\"display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding:13px 14px;background:var(--primary-5);border-radius:11px;cursor:pointer\">\n                    <span style=\"display:flex;align-items:center;gap:9px;font:700 13px/1 var(--font-body);color:var(--primary)\"><i class=\"ph ph-ruler\" style=\"font-size:18px\"><\u002Fi>View measurements<\u002Fspan>\n                    <i class=\"ph ph-caret-right\" style=\"font-size:16px;color:var(--primary);transition:transform .2s;transform:{{ it.caret }}\"><\u002Fi>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ it.measureOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:9px\">\n                      <sc-for list=\"{{ it.measures }}\" as=\"m\" hint-placeholder-count=\"6\">\n     <sc-if value=\"{{ it.showItemBd }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border-top:1px solid var(--border-soft);padding:14px;background:var(--cream-pink)\">\n                    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\">\n                      <span style=\"font:600 15px/1.2 var(--font-display);color:var(--ink)\">{{ headings.item }}<\u002Fspan>\n                      <span style=\"font:500 11px/1 var(--font-body);color:var(--ink-4)\">{{ headings.itemSub }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <sc-for list=\"{{ it.breakdown }}\" as=\"r\" hint-placeholder-count=\"6\">\n                      <div style=\"{{ r.rowStyle }}\"><span style=\"{{ r.labelStyle }}\">{{ r.label }}<\u002Fspan><span style=\"{{ r.valStyle }}\">{{ r.value }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- inline pay -->\n                <sc-if value=\"{{ it.showInlinePay }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:14px;border-top:1px solid var(--border-soft)\">\n                    <sc-if value=\"{{ it.isPay }}\" hint-placeholder-val=\"{{ false }}\">\n                      <button onclick=\"{{ it.onPay }}\" style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:9px;height:50px;background:var(--gold);color:var(--primary-90);border:none;border-radius:12px;font:900 15px/1 var(--font-body);cursor:pointer;box-shadow:0 6px 16px -6px rgba(255,195,0,.7)\"><i class=\"ph-fill ph-qr-code\" style=\"font-size:19px\"><\u002Fi>Pay remaining {{ it.remainingFmt }}<\u002Fbutton>\n                      <div style=\"text-align:center;font:500 11px/1.4 var(--font-body);color:var(--ink-4);margin-top:9px\">Item shipped — scan QR to clear the balance for this piece<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ it.isLocked }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:9px;height:50px;background:var(--gray-10);color:var(--ink-4);border:1px solid var(--border-soft);border-radius:12px;font:700 14px/1 var(--font-body)\"><i class=\"ph ph-lock-simple\" style=\"font-size:18px\"><\u002Fi>Unlocks when shipped<\u002Fdiv>\n                      <div style=\"text-align:center;font:500 11px/1.4 var(--font-body);color:var(--ink-4);margin-top:9px\">{{ it.remainingFmt }} balance becomes payable once this item ships<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ it.isPaid }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:9px;height:50px;background:var(--success-10);color:var(--success-60);border:1px solid var(--success-30);border-radius:12px;font:800 14px/1 var(--font-body)\"><i class=\"ph-fill ph-check-circle\" style=\"font-size:19px\"><\u002Fi>Paid in full<\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <!-- order-level breakdown -->\n            <div style=\"background:#fff;border:1px solid var(--border-soft);border-radius:16px;box-shadow:var(--shadow-sm);padding:16px;margin-bottom:16px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\">\n                <span style=\"font:600 17px/1.2 var(--font-display);color:var(--ink)\">{{ headings.order }}<\u002Fspan>\n                <span style=\"font:500 11px/1 var(--font-body);color:var(--ink-4)\">{{ headings.orderSub }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ d.orderBreakdown }}\" as=\"r\" hint-placeholder-count=\"8\">\n                <div style=\"{{ r.rowStyle }}\"><span style=\"{{ r.labelStyle }}\">{{ r.label }}<\u002Fspan><span style=\"{{ r.valStyle }}\">{{ r.value }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- payment method + invoice -->\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:4px 2px 14px\">\n              <span style=\"font:500 13px/1 var(--font-body);color:var(--ink-3)\">Payment method<\u002Fspan>\n              <span style=\"font:700 13px/1 var(--font-body);color:var(--ink)\">UPI · Online payment<\u002Fspan>\n            <\u002Fdiv>\n            <button style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:9px;height:50px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);border-radius:12px;font:700 14px/1 var(--font-body);cursor:pointer\"><i class=\"ph ph-receipt\" style=\"font-size:19px\"><\u002Fi>Download invoice<\u002Fbutton>\n            <div style=\"display:flex;align-items:center;justify-content:center;gap:7px;margin-top:18px;color:var(--ink-3)\"><i class=\"ph ph-question\" style=\"font-size:18px\"><\u002Fi><span style=\"font:700 13px/1 var(--font-body)\">Need help? Contact support<\u002Fspan><i class=\"ph ph-caret-right\" style=\"font-size:14px\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- sticky pay bar -->\n      <sc-if value=\"{{ d.showSticky }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:none;display:flex;align-items:center;gap:12px;padding:13px 18px 16px;background:#fff;border-top:1px solid var(--border-soft);box-shadow:0 -6px 20px -8px rgba(20,8,12,.14)\">\n          <div style=\"flex:1\">\n            <div style=\"font:500 11px/1 var(--font-body);color:var(--ink-4)\">Remaining balance<\u002Fdiv>\n            <div style=\"font:900 20px/1.1 var(--font-body);color:var(--ink);margin-top:4px\">{{ d.stickyRemainingFmt }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ d.onPayOrder }}\" style=\"display:flex;align-items:center;gap:8px;height:52px;padding:0 22px;background:var(--gold);color:var(--primary-90);border:none;border-radius:13px;font:900 15px/1 var(--font-body);cursor:pointer;box-shadow:0 8px 18px -6px rgba(255,195,0,.7)\"><i class=\"ph-fill ph-qr-code\" style=\"font-size:20px\"><\u002Fi>Pay remaining<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- home indicator -->\n      <div style=\"flex:none;height:24px;display:flex;align-items:center;justify-content:center;background:var(--cream)\"><div style=\"width:128px;height:5px;border-radius:999px;background:rgba(20,8,12,.32)\"><\u002Fdiv><\u002Fdiv>\n\n      <!-- ============ BOTTOM SHEET ============ -->\n      <sc-if value=\"{{ sheetOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .2s ease\">\n          <div onclick=\"{{ onClose }}\" style=\"position:absolute;inset:0;background:rgba(20,8,12,.5)\"><\u002Fdiv>\n\n          <!-- QR sheet -->\n          <sc-if value=\"{{ isQr }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:relative;background:#fff;border-radius:26px 26px 0 0;padding:8px 22px 26px;animation:sheetUp .3s cubic-bezier(.2,.8,.2,1);max-height:96%;overflow-y:auto\" class=\"noscroll\">\n              <div style=\"width:40px;height:5px;border-radius:999px;background:var(--gray-40);margin:6px auto 14px\"><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px\">\n                <div>\n                  <div style=\"font:600 20px/1.1 var(--font-display);color:var(--ink)\">Scan to pay balance<\u002Fdiv>\n                  <div style=\"font:500 12px/1.4 var(--font-body);color:var(--ink-3);margin-top:4px\">{{ sheetSub }}<\u002Fdiv>\n                <\u002Fdiv>\n                <i onclick=\"{{ onClose }}\" class=\"ph ph-x\" style=\"font-size:22px;color:var(--ink-3);cursor:pointer\"><\u002Fi>\n              <\u002Fdiv>\n\n              <div style=\"margin:16px 0;padding:18px;border:1px solid var(--border-soft);border-radius:18px;background:var(--cream);display:flex;flex-direction:column;align-items:center\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px\"><i class=\"ph-fill ph-storefront\" style=\"font-size:18px;color:var(--primary)\"><\u002Fi><span style=\"font:700 13px/1 var(--font-body);color:var(--ink)\">Silhouwed Boutiques<\u002Fspan><\u002Fdiv>\n                <div style=\"position:relative;width:208px;height:208px;background:#fff;border-radius:14px;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;padding:12px\">\n                  <div style=\"{{ qrStyle }}\"><\u002Fdiv>\n                  <div style=\"position:absolute;width:46px;height:46px;background:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px #fff\"><i class=\"ph-fill ph-scissors\" style=\"font-size:22px;color:var(--primary)\"><\u002Fi><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:16px;font:500 12px/1 var(--font-body);color:var(--ink-4)\">Amount payable now<\u002Fdiv>\n                <div style=\"font:900 30px/1.1 var(--font-body);color:var(--primary);margin-top:4px\">{{ sheetAmountFmt }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:6px;margin-top:10px;padding:6px 12px;background:var(--gray-10);border-radius:999px\"><span style=\"font:500 11px/1 var(--font-body);color:var(--ink-3)\">UPI ID<\u002Fspan><span style=\"font:700 11px/1 var(--font-body);color:var(--ink)\">silhouwed@upi<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;align-items:flex-start;gap:9px;padding:11px 13px;background:var(--gold-10);border-radius:11px;margin-bottom:16px\">\n                <i class=\"ph-fill ph-info\" style=\"f or:var(--ink)\">{{ sheetAmountFmt }}<\u002Fspan> must be cleared before delivery — you can return to this screen any time.<\u002Fdiv>\n              <button onclick=\"{{ onConfirmLater }}\" style=\"width:100%;height:52px;margin-top:20px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);border-radius:13px;font:800 15px/1 var(--font-body);cursor:pointer\">Yes, I'll pay later<\u002Fbutton>\n              <button onclick=\"{{ onKeepPaying }}\" style=\"width:100%;height:52px;margin-top:10px;background:var(--primary);color:#fff;border:none;border-radius:13px;font:800 15px/1 var(--font-body);cursor:pointer\">Keep paying now<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- success sheet -->\n          <sc-if value=\"{{ isSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:relative;background:#fff;border-radius:26px 26px 0 0;padding:8px 22px 28px;animation:sheetUp .3s cubic-bezier(.2,.8,.2,1)\">\n              <div style=\"width:40px;height:5px;border-radius:999px;background:var(--gray-40);margin:6px auto 8px\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;align-items:center;padding:10px 0 4px\">\n                <div style=\"width:84px;height:84px;border-radius:999px;background:var(--success-10);display:flex;align-items:center;justify-content:center;animation:pop .45s cubic-bezier(.2,.9,.3,1.2)\"><i class=\"ph-fill ph-check-circle\" style=\"font-size:54px;color:var(--success)\"><\u002Fi><\u002Fdiv>\n                <div style=\"font:600 23px/1.2 var(--font-display);color:var(--ink);margin-top:18px\">Payment successful<\u002Fdiv>\n                <div style=\"font:500 13px/1.5 var(--font-body);color:var(--ink-3);margin-top:8px;text-align:center\">{{ successSub }}<\u002Fdiv>\n                <div style=\"width:100%;margin-top:20px;padding:16px;background:var(--cream);border:1px solid var(--border-soft);border-radius:14px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:11px;border-bottom:1px solid var(--border-soft)\"><span style=\"font:500 13px/1 var(--font-body);color:var(--ink-3)\">Amount paid<\u002Fspan><span style=\"font:900 17px/1 var(--font-body);color:var(--success)\">{{ sheetAmountFmt }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;padding-top:11px\"><span style=\"font:500 13px/1 var(--font-body);color:var(--ink-3)\">Remaining on order<\u002Fspan><span style=\"font:800 15px/1 var(--font-body);color:var(--ink)\">{{ successRemainingFmt }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ onDone }}\" style=\"width:100%;height:52px;margin-top:20px;background:var(--primary);color:#fff;border:none;border-radius:13px;font:800 15px/1 var(--font-body);cursor:pointer\">Done<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:446,&quot;height&quot;:924},&quot;headingStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;bill&quot;,&quot;summary&quot;,&quot;warm&quot;],&quot;default&quot;:&quot;warm&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Copy&quot;,&quot;label&quot;:&quot;Breakdown headings&quot;},&quot;payPlacement&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;auto&quot;,&quot;sticky&quot;,&quot;inline&quot;],&quot;default&quot;:&quot;inline&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;,&quot;label&quot;:&quot;Pay Remaining placement&quot;}}\">\nclass Component extends DCLogic {\n  state = { route: 'list', orderId: null, sheet: null, target: null, paid: {}, measure: {} };\n\n  data = [\n    {\n      id: 'ORD-MQBEEUF7TBG1BH', boutique: 'Label Nitika Arora', date: '13 Jun 2026',\n      placedAt: '13 Jun 2026, 2:18 am',\n      items: [\n        { id: 'd1', name: 'Ivory organza layered asymmetric dress', tag: 'Lehenga', qty: 1, img: (window.__resources && window.__resources.dress) || 'assets/dress.jpg',\n          status: 'Shipped', deliver: '25 Jun 2026', mrp: 97500, offer: 48750, coupon: 2750, shipping: 1200,\n          measures: [['Bust', '34\"'], ['Waist', '28\"'], ['Hip', '38\"'], ['Length', '54\"'], ['Shoulder', '14\"'], ['Sleeve', '22\"']] }\n      ]\n    },\n    {\n      id: 'ORD-MQWN6R3QQYUQL6', boutique: 'Ridhima Bhasin', date: '27 Jun 2026',\n      placedAt: '27 Jun 2026, 11:54 am',\n      items: [\n        { id: 'a', name: 'Saadirah Saree', tag: 'Saree', qty: 1, img: (window.__resources && window.__resources.saree) || 'assets/saree.jpg',\n          status: 'Shipped', deliver: '14 Jul 2026', mrp: 110000, offer: 60000, coupon: 0, shipping: 600,\n          measures: [['Blouse', '36\"'], ['Waist', '30\"'], ['Length', '42\"'], ['Sleeve', '11\"'], ['Fall', 'Yes'], ['Pico', 'Yes']] },\n        { id: 'b', name: 'Midnight whisper jacket set', tag: 'Co-ord set', qty: 1, img: (window.__resources && window.__resources.jacketset) || 'assets/jacketset.jpg',\n          status: 'In production', deliver: '15 Jul 2026', mrp: 96000, offer: 54000, coupon: 4000, shipping: 600,\n          measures: [['Bust', '36\"'], ['Waist', '31\"'], ['Hip', '40\"'], ['Jacket', '26\"'], ['Pant', '40\"'], ['Shoulder', '15\"']] }\n      ]\n    }\n  ];\n\n  fmt(n) { return '\\u20B9' + Math.round(n).toLocaleString('en-IN'); }\n\n  ci(it) {\n    const final = it.offer - it.coupon;\n    const gst = Math.round(final * 0.18);\n    const total = final + gst + it.shipping;\n    const paid = Math.round(total / 2);\n    return { final, gst, total, paid, remaining: total - paid };\n  }\n\n  STATUS = {\n    'Shipped': '#3C4CAD', 'In production': '#AA8200', 'Delivered': '#2D8659', 'Order placed': '#676767'\n  };\n\n  // ---- row factory ----\n  base = { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0' };\n  row(label, value, o = {}) {\n    const rowStyle = { ...this.base };\n    if (o.top) { rowStyle.borderTop = '1px solid var(--border-soft)'; rowStyle.marginTop = '5px'; rowStyle.paddingTop = '12px'; }\n    if (o.hi) Object.assign(rowStyle, { background: 'var(--primary-5)', borderRadius: '11px', padding: '13px 14px', marginTop: '9px' });\n    if (o.due) Object.assign(rowStyle, { background: 'var(--gold-10)', borderRadius: '11px', padding: '13px 14px', marginTop: '9px' });\n    const labelStyle = { font: '500 14px/1.4 var(--font-body)', color: 'var(--ink-3)' };\n    if (o.strong) { labelStyle.color = 'var(--ink)'; labelStyle.fontWeight = '700'; }\n    if (o.hi || o.due) { labelStyle.color = 'var(--ink)'; labelStyle.fontWeight = '700'; labelStyle.fontSize = '15px'; }\n    const valStyle = { font: '700 14px/1.4 var(--font-body)', color: 'var(--ink)' };\n    if (o.pos) valStyle.color = 'var(--success)';\n    if (o.muted) { valStyle.color = 'var(--ink-4)'; valStyle.fontWeight = '600'; }\n    if (o.strong) valStyle.fontWeight = '900';\n    if (o.hi) { valStyle.color = 'var(--primary)'; valStyle.fontWeight = '900'; valStyle.fontSize = '17px'; }\n    if (o.due) { valStyle.color = 'var(--gold-80)'; valStyle.fontWeight = '900'; valStyle.fontSize = '17px'; }\n    return { label, value, rowStyle, labelStyle, valStyle };\n  }\n\n  timeline(status, paid) {\n    const steps = ['Order placed', 'In production', 'Shipped', 'Delivered'];\n    const idx = { 'Order placed': 0, 'In production': 1, 'Shipped': 2, 'Delivered': 3 }[status] ?? 0;\n    return steps.map((label, i) => {\n      const done = i <= idx;\n      return {\n        label,\n        dotBg: done ? 'var(--primary)' : '#fff',\n        dotBorder: done ? 'var(--primary)' : 'var(--gray-40)',\n        lineColor: i > 0 && i <= idx ? 'var(--primary)' : 'var(--border-soft)',\n        checkOpacity: done ? '1' : '0',\n        labelColor: i === idx ? 'var(--primary)' : (done ? 'var(--ink-3)' : 'var(--ink-4)')\n      };\n    });\n  }\n\n  qrSrc(seed) {\n    const n = 27, cell = 8, q = 2, size = (n + q * 2) * cell;\n    let s = 7; for (const c of seed) s = (s * 31 + c.charCodeAt(0)) >>> 0;\n    const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };\n    const m = Array.from({ length: n }, () => Array(n).fill(0));\n    for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) m[y][x] = rnd() > 0.52 ? 1 : 0;\n    const finder = (ox, oy) => { for (let y = -1; y <= 7; y++) for (let x = -1; x <= 7; x++) { const X = ox + x, Y = oy + y; if (X < 0 || Y < 0 || X >= n || Y >= n) continue; const b = (x >= 0 && x <= 6 && (y === 0 || y === 6)) || (y >= 0 && y <= 6 && (x === 0 || x === 6)); const core = x >= 2 && x <= 4 && y >= 2 && y <= 4; m[Y][X] = (b || core) ? 1 : 0; } };\n    finder(0, 0); finder(n - 7, 0); finder(0, n - 7);\n    let r = '';\n    for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) if (m[y][x]) r += '<rect x=\"' + (x + q) * cell + '\" y=\"' + (y + q) * cell + '\" width=\"' + cell + '\" height=\"' + cell + '\"/>';\n    const svg = '<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"' + size + '\" height=\"' + size + '\" viewBox=\"0 0 ' + size + ' ' + size + '\"><rect width=\"100%\" height=\"100%\" fill=\"#fff\"/><g fill=\"#1C060D\">' + r + '<\u002Fg><\u002Fsvg>';\n    return 'data:image/svg+xml,' + encodeURIComponent(svg);\n  }\n\n  headings() {\n    const s = this.props.headingStyle ?? 'bill';\n    if (s === 'summary') return { item: 'Item summary', itemSub: 'Made-to-measure', order: 'Order summary', orderSub: 'All items' };\n    if (s === 'warm') return { item: 'This piece', itemSub: 'Made-to-measure', order: 'Your order', orderSub: 'Everything together' };\n    return { item: 'Item bill', itemSub: 'Made-to-measure', order: 'Order bill', orderSub: 'All items' };\n  }\n\n  effPlacement(multi) {\n    const p = this.props.payPlacement ?? 'auto';\n    if (p === 'auto') return multi ? 'inline' : 'sticky';\n    return p;\n  }\n\n  // ---- handlers ----\n  open(id) { this.setState({ route: 'detail', orderId: id, measure: {} }); }\n  back() { this.setState({ route: 'list', orderId: null, sheet: null }); }\n  payItem(orderId, itemId, amount, word) { this.setState({ sheet: 'qr', target: { kind: 'item', orderId, itemId, amount, word } }); }\n  payOrder(orderId, amount, items) { this.setState({ sheet: 'qr', target: { kind: 'order', orderId, items, amount, word: 'order' } }); }\n  simulate() { this.setState({ sheet: 'success' }); }\n  askLater() { this.setState({ sheet: 'abort' }); }\n  keepPaying() { this.setState({ sheet: 'qr' }); }\n  confirmLater() { this.setState({ sheet: null, target: null }); }\n  close() { this.setState({ sheet: null, target: null }); }\n  done() {\n    const t = this.state.target, paid = { ...this.state.paid };\n    if (t) { if (t.kind === 'item') paid[t.itemId] = true; else (t.items || []).forEach(i => paid[i] = true); }\n    this.setState({ paid, sheet: null, target: null });\n  }\n  toggleMeasure(id) { const m = { ...this.state.measure }; m[id] = !m[id]; this.setState({ measure: m }); }\n\n  renderVals() {\n    const { route, orderId, sheet, target, paid, measure } = this.state;\n    const H = this.headings();\n\n    const orders = this.data.map(o => {\n      const comps = o.items.map(it => this.ci(it));\n      const totalOffer = o.items.reduce((s, it) => s + it.offer, 0);\n      const balance = o.items.reduce((s, it, i) => s + (it.status === 'Shipped' && !paid[it.id] ? comps[i].remaining : 0), 0);\n      return {\n        idShort: o.id, boutique: o.boutique, date: o.date,\n        itemCount: o.items.length + (o.items.length > 1 ? ' items' : ' item'),\n        totalFmt: this.fmt(totalOffer),\n        hasBalance: balance > 0, balanceFmt: this.fmt(balance),\n        onOpen: () => this.open(o.id),\n        items: o.items.map(it => ({\n          name: it.name, qty: it.qty, deliver: it.deliver,\n          imgStyle: { width: '54px', height: '66px', flex: 'none', borderRadius: '9px', backgroundImage: 'url(\"' + it.img + '\")', backgroundSize: 'cover', backgroundPosition: 'center top' },\n          statusLabel: paid[it.id] ? 'Balance paid' : it.status,\n          statusColor: paid[it.id] ? this.STATUS['Delivered'] : (this.STATUS[it.status] || 'var(--ink-3)')\n        }))\n      };\n    });\n\n    let d = null;\n    if (route === 'detail') {\n      const o = this.data.find(x => x.id === orderId);\n      const multi = o.items.length > 1;\n      const placement = this.effPlacement(multi);\n      const comps = o.items.map(it => this.ci(it));\n\n      const items = o.items.map((it, i) => {\n        const c = comps[i];\n        const isPaid = !!paid[it.id];\n        const isShipped = it.status === 'Shipped';\n        const isPay = isShipped && !isPaid;\n        const isLocked = !isShipped && !isPaid;\n        const bd = [\n          this.row('MRP', this.fmt(it.mrp)),\n          this.row('Offer price', this.fmt(it.offer)),\n          this.row('Coupon discount', it.coupon ? '\\u2013' + this.fmt(it.coupon) : '\\u20B90', { pos: it.coupon > 0 }),\n          this.row('Final price', this.fmt(c.final), { strong: true }),\n          this.row('GST (18%)', this.fmt(c.gst)),\n          this.row('Shipping & packaging', it.shipping ? this.fmt(it.shipping) : 'FREE', { pos: !it.shipping }),\n          this.row('Item total', this.fmt(c.total), { strong: true, top: true }),\n          this.row('Paid at checkout (50%)', this.fmt(c.paid), { muted: true }),\n          this.row(isPaid ? 'Balance paid (50%)' : 'Balance remaining (50%)', isPaid ? this.fmt(0) : this.fmt(c.remaining), isPaid ? { pos: true, top: true } : { due: true })\n        ];\n        return {\n          lineId: o.id + '-' + (i + 1), name: it.name, qty: it.qty, deliver: it.deliver,\n          imgStyle: { width: '74px', height: '92px', flex: 'none', borderRadius: '11px', backgroundImage: 'url(\"' + it.img + '\")', backgroundSize: 'cover', backgroundPosition: 'center top' },\n          priceFmt: 'Price ' + this.fmt(it.offer),\n          statusLabel: isPaid ? 'Balance paid' : it.status,\n          statusColor: isPaid ? this.STATUS['Delivered'] : (this.STATUS[it.status] || 'var(--ink-3)'),\n          measureOpen: !!measure[it.id], caret: measure[it.id] ? 'rotate(90deg)' : 'rotate(0deg)',\n          measures: it.measures.map(m => ({ k: m[0], v: m[1] })),\n          onToggleMeasure: () => this.toggleMeasure(it.id),\n          timeline: this.timeline(isPaid ? 'Shipped' : it.status, isPaid),\n          showItemBd: multi, breakdown: bd,\n          remainingFmt: this.fmt(c.remaining),\n          showInlinePay: placement === 'inline', isPay, isPaid, isLocked,\n          onPay: () => this.payItem(o.id, it.id, c.remaining, it.tag === 'Saree' ? 'saree' : 'item')\n        };\n      });\n\n      const totalMrp = o.items.reduce((s, it) => s + it.mrp, 0);\n      const totalOffer = o.items.reduce((s, it) => s + it.offer, 0);\n      const totalCoupon = o.items.reduce((s, it) => s + it.coupon, 0);\n      const totalShip = o.items.reduce((s, it) => s + it.shipping, 0);\n      const totalGst = comps.reduce((s, c) => s + c.gst, 0);\n      const grand = comps.reduce((s, c) => s + c.total, 0);\n      const totalPaid = comps.reduce((s, c) => s + c.paid, 0);\n      const owed = o.items.reduce((s, it, i) => s + (paid[it.id] ? 0 : comps[i].remaining), 0);\n      const payable = o.items.reduce((s, it, i) => s + (it.status === 'Shipped' && !paid[it.id] ? comps[i].remaining : 0), 0);\n\n      const ob = [\n        this.row('Total MRP', this.fmt(totalMrp)),\n        this.row('Discount on MRP', '\\u2013' + this.fmt(totalMrp - totalOffer), { pos: true }),\n        this.row('Total offer price', this.fmt(totalOffer), { strong: true }),\n        this.row('Coupon discount', totalCoupon ? '\\u2013' + this.fmt(totalCoupon) : '\\u20B90', { pos: totalCoupon > 0 }),\n        this.row('Shipping & packaging', this.fmt(totalShip)),\n        this.row('GST (18%)', this.fmt(totalGst)),\n        this.row('Grand total', this.fmt(grand), { hi: true }),\n        this.row('Amount paid (50%)', this.fmt(totalPaid), { muted: true, top: true }),\n        this.row('Total amount remaining', this.fmt(owed), { due: true })\n      ];\n\n      const lockedExists = o.items.some((it, i) => it.status !== 'Shipped' && !paid[it.id]);\n      const shippedCount = o.items.filter(it => it.status === 'Shipped').length;\n      d = {\n        idFull: o.id, statusLabel: multi ? 'Partially shipped' : 'Shipped',\n        statusColor: this.STATUS['Shipped'], placedAt: o.placedAt, deliver: o.items[o.items.length - 1].deliver,\n        items,\n        showBanner: owed > 0,\n        bannerRemainingFmt: this.fmt(owed),\n        bannerNote: payable > 0 && lockedExists ? (this.fmt(payable) + ' ready now \\u00B7 rest unlocks on shipping')\n          : (payable <= 0 && lockedExists ? 'Unlocks once your remaining items ship'\n          : 'Due before your order is delivered'),\n        orderBreakdown: ob,\n        showSticky: placement === 'sticky' && payable > 0,\n        stickyRemainingFmt: this.fmt(payable),\n        onPayOrder: () => this.payOrder(o.id, payable, o.items.filter(it => it.status === 'Shipped' && !paid[it.id]).map(it => it.id))\n      };\n    }\n\n    // sheet vals\n    let sheetSub = '', sheetAmountFmt = '', successSub = '', successRemainingFmt = '', sheetTargetWord = 'item', qrSrc = '';\n    if (target) {\n      sheetAmountFmt = this.fmt(target.amount);\n      sheetTargetWord = target.word;\n      qrSrc = this.qrSrc(target.orderId + (target.itemId || 'order') + target.amount);\n      const o = this.data.find(x => x.id === target.orderId);\n      if (target.kind === 'item') {\n        const it = o.items.find(x => x.id === target.itemId);\n        sheetSub = 'Made-to-measure balance \\u00B7 ' + it.name;\n      } else {\n        sheetSub = 'Made-to-measure balance \\u00B7 Order #' + o.id;\n      }\n      // remaining after this payment, at order level\n      const comps = o.items.map(x => this.ci(x));\n      const paidAfter = { ...paid };\n      if (target.kind === 'item') paidAfter[target.itemId] = true; else (target.items || []).forEach(i => paidAfter[i] = true);\n      const owedAfter = o.items.reduce((s, x, i) => s + (paidAfter[x.id] ? 0 : comps[i].remaining), 0);\n      successRemainingFmt = this.fmt(owedAfter);\n      successSub = owedAfter > 0\n        ? 'Balance cleared for this piece. ' + this.fmt(owedAfter) + ' remains on items still in production.'\n        : 'Your order is now fully paid. We\\u2019ll dispatch as each piece is ready.';\n    }\n\n    return {\n      isList: route === 'list', isDetail: route === 'detail',\n      headerTitle: route === 'list' ? 'Your orders' : 'Order details',\n      onBack: () => this.back(),\n      orders, d, headings: H,\n      sheetOpen: !!sheet, isQr: sheet === 'qr', isAbort: sheet === 'abort', isSuccess: sheet === 'success',\n      sheetSub, sheetAmountFmt, successSub, successRemainingFmt, sheetTargetWord,\n      qrStyle: { width: '100%', height: '100%', backgroundImage: 'url(\"' + qrSrc + '\")', backgroundSize: 'contain', backgroundRepeat: 'no-repeat', backgroundPosition: 'center', imageRendering: 'pixelated' },\n      onClose: () => this.close(), onSimulate: () => this.simulate(), onAskLater: () => this.askLater(),\n      onKeepPaying: () => this.keepPaying(), onConfirmLater: () => this.confirmLater(), onDone: () => this.done()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
